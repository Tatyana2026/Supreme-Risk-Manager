<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 1px solid #333; padding: 20px; border-radius: 20px; background: #0a0a0a; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 10px; }
        button { width: 95%; padding: 15px; background: #fff; color: #000; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; }
        #res { margin-top: 20px; display: none; text-align: left; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>SUPREME CALC 2.0</h3>
        <input type="number" id="b" placeholder="Депозит (USDT)">
        <input type="number" id="r" placeholder="Риск (%)">
        <input type="number" id="e" placeholder="Вход">
        <input type="number" id="s" placeholder="Стоп">
        <button onclick="calc()">РАССЧИТАТЬ</button>
        <div id="res">
            <p>Объем: <b id="p"></b></p>
            <p>Плечо: <b id="l"></b></p>
        </div>
    </div>
    <script>
        function calc() {
            let b = document.getElementById('b').value;
            let r = document.getElementById('r').value;
            let e = document.getElementById('e').value;
            let s = document.getElementById('s').value;
            if(b && r && e && s) {
                let diff = Math.abs(e - s) / e;
                let pos = (b * (r/100)) / diff;
                let lev = Math.floor(1 / (diff * 1.5));
                document.getElementById('res').style.display = 'block';
                document.getElementById('p').innerText = pos.toFixed(0) + ' USDT';
                document.getElementById('l').innerText = (lev > 125 ? 125 : lev) + 'x';
            }
        }
    </script>
</body>
</html>
