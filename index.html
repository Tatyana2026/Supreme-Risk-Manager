<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Supreme Pro Terminal 4.2</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .card { background: #111; border: 1px solid #333; border-radius: 20px; padding: 15px; width: 100%; max-width: 400px; box-sizing: border-box; }
        .mode-switch { display: flex; gap: 10px; margin-bottom: 12px; }
        .mode-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; cursor: pointer; font-weight: bold; transition: 0.3s; }
        
        /* Цвета для кнопок направлений */
        .mode-btn.active-long { background: #00c853; border-color: #00c853; box-shadow: 0 0 15px rgba(0,200,83,0.4); }
        .mode-btn.active-short { background: #ff3d00; border-color: #ff3d00; box-shadow: 0 0 15px rgba(255,61,0,0.4); }
        
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; font-size: 16px; outline: none; }
        .price-badge { font-size: 12px; color: #00c853; text-align: right; margin-bottom: 5px; height: 15px; font-weight: bold; }
        .quick-risk { display: flex; gap: 8px; margin: 10px 0; }
        .risk-btn { flex: 1; padding: 10px; background: #222; border: 1px solid #444; color: #ccc; border-radius: 8px; font-size: 13px; cursor: pointer; }
        .risk-btn.selected { background: #fff; color: #000; border-color: #fff; font-weight: bold; }
        button.main-btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: #fff; color: #000; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; }
        #chart-container { width: 100%; height: 300px; margin-top: 15px; border-radius: 15px; overflow: hidden; border: 1px solid #333; display: none; }
        .result { margin-top: 15px; padding: 15px; border-radius: 12px; display: none; background: #1a1a1a; border: 1px solid #333; }
        .verdict { font-weight: bold; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 10px; }
        .good { background: rgba(0, 200, 83, 0.2); color: #00c853; border: 1px solid #00c853; }
        .bad { background: rgba(255, 61, 0, 0.2); color: #ff3d00; border: 1px solid #ff3d00; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="text-align:center; font-size: 18px; margin-top:0;">SUPREME TERMINAL 4.2</h2>
        
        <div class="mode-switch">
            <button id="longBtn" class="mode-btn active-long" onclick="setMode('LONG')">LONG ↑</button>
            <button id="shortBtn" class="mode-btn" onclick="setMode('SHORT')">SHORT ↓</button>
        </div>

        <input list="coin-list" id="coin" placeholder="Введите монету (напр. SOL)" oninput="handleInput()">
        <datalist id="coin-list">
            <option value="BTC"> <option value="ETH"> <option value="SOL"> <option value="BNB"> <option value="XRP">
            <option value="DOGE"> <option value="ADA"> <option value="AVAX"> <option value="DOT"> <option value="LINK">
            <option value="MATIC"> <option value="TRX"> <option value="LTC"> <option value="BCH"> <option value="SHIB">
            <option value="APT"> <option value="SUI"> <option value="NEAR"> <option value="PEPE"> <option value="FET">
            <option value="RNDR"> <option value="TIA"> <option value="WIF"> <option value="TAO"> <option value="STX">
        </datalist>
        <div id="price-display" class="price-badge"></div>

        <input type="number" id="balance" placeholder="Депозит (USDT)" inputmode="decimal">
        
        <div class="quick-risk">
            <button class="risk-btn" onclick="setRisk(1, this)">1%</button>
            <button class="risk-btn" onclick="setRisk(2, this)">2%</button>
            <button class="risk-btn" onclick="setRisk(3, this)">3%</button>
            <button class="risk-btn" onclick="setRisk(5, this)">5%</button>
        </div>
        <input type="number" id="risk" placeholder="Свой риск %" inputmode="decimal">
        
        <input type="number" id="entry" placeholder="Цена входа" inputmode="decimal">
        <input type="number" id="stop" placeholder="Цена стопа" inputmode="decimal">
        <input type="number" id="tp1" placeholder="Тейк 1" inputmode="decimal">
        <input type="number" id="tp2" placeholder="Тейк 2" inputmode="decimal">
        
        <button class="main-btn" onclick="calculate()">АНАЛИЗИРОВАТЬ</button>

        <div id="result" class="result">
            <div id="verdictBox" class="verdict"></div>
            <div id="stats" style="font-size: 15px; line-height: 1.6;"></div>
        </div>

        <div id="chart-container"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let currentMode = 'LONG';
        let timer;

        function setMode(mode) {
            currentMode = mode;
            const lBtn = document.getElementById('longBtn');
            const sBtn = document.getElementById('shortBtn');
            
            if (mode === 'LONG') {
                lBtn.classList.add('active-long');
                sBtn.classList.remove('active-short');
            } else {
                sBtn.classList.add('active-short');
                lBtn.classList.remove('active-long');
            }
        }

        function setRisk(val, btn) { 
            document.getElementById('risk').value = val;
            document.querySelectorAll('.risk-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function handleInput() {
            clearTimeout(timer);
            timer = setTimeout(updateData, 800);
        }

        async function updateData() {
            let symbol = document.getElementById('coin').value.toUpperCase().trim();
            if (!symbol) return;
            if (!symbol.endsWith('USDT')) symbol += 'USDT';

            try {
                const response = await fetch(https://api.binance.com/api/v3/ticker/price?symbol=${symbol});
                const data = await response.json();
                if (data.price) {
                    const p = parseFloat(data.price).toFixed(4);
                    document.getElementById('price-display').innerText = Живая цена: $${p};
                    if (!document.getElementById('entry').value) {
                        document.getElementById('entry').value = p;
                    }
                    document.getElementById('price-display').style.color = "#00c853";
                } else {
                    document.getElementById('price-display').innerText = "Цена не найдена (проверьте тикер)";
                    document.getElementById('price-display').style.color = "#ff3d00";
                }
            } catch (e) { }

            document.getElementById('chart-container').style.display = 'block';
            new TradingView.widget({
                "width": "100%", "height": 300, "symbol": symbol,
                "interval": "60", "theme": "dark", "style": "1",
                "locale": "ru", "container_id": "chart-container",
                "hide_top_toolbar": true
            });
        }

        function calculate() {
            const balance = parseFloat(document.getElementById('balance').value);
            const riskPercent = parseFloat(document.getElementById('risk').value);
            const entry = parseFloat(document.getElementById('entry').value);
            const stop = parseFloat(document.getElementById('stop').value);
            const tp2 = parseFloat(document.getElementById('tp2').value);

            if (!balance || !riskPercent || !entry || !stop) return alert("Заполни все поля!");

            const riskAmount = (balance * (riskPercent / 100)).toFixed(2);
            const stopDist = Math.abs(entry - stop);
            const stopPercent = (stopDist / entry * 100).toFixed(2);
            const positionSize = (riskAmount / (stopPercent / 100)).toFixed(2);
            const leverage = Math.floor(95 / stopPercent);

            const tpDist = Math.abs((tp2 || entry) - entry);
            const rr = (tpDist / stopDist).toFixed(1);
            
            const vBox = document.getElementById('verdictBox');
            if (rr >= 2.5) {
                vBox.innerText = "✅ ОТЛИЧНАЯ СДЕЛКА (RR 1:" + rr + ")";
                vBox.className = "verdict good";
            } else {
                vBox.innerText = "⚠️ НИЗКИЙ ПРОФИТ (RR 1:" + rr + ")";
                vBox.className = "verdict bad";
            }

            document.getElementById('result').style.display = 'block';
            document.getElementById('stats').innerHTML = `
                <b>Направление:</b> ${currentMode}<br>
                <b>Потеря при стопе:</b> $${riskAmount}<br>
                <b>Размер позиции:</b> $${positionSize}<br>
                <b>Реком. плечо:</b> ${leverage > 100 ? 100 : leverage}x<br>
                <b>Дистанция стопа:</b> ${stopPercent}%
            `;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
