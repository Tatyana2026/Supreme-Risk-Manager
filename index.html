<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Supreme Terminal 5.1</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .card { background: #111; border: 1px solid #333; border-radius: 20px; padding: 15px; width: 100%; max-width: 400px; box-sizing: border-box; }
        
        .mode-switch { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; cursor: pointer; font-weight: bold; }
        .btn-l.active { background: #00c853 !important; }
        .btn-s.active { background: #ff3d00 !important; }

        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; font-size: 16px; outline: none; }
        
        .quick-risk { display: flex; gap: 8px; margin: 10px 0; }
        .risk-btn { flex: 1; padding: 10px; background: #222; border: 1px solid #444; color: #ccc; border-radius: 8px; cursor: pointer; }
        .risk-btn.active { background: #fff !important; color: #000 !important; font-weight: bold; }

        .main-btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: #fff; color: #000; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; }
        .copy-btn { width: 100%; padding: 12px; border-radius: 10px; border: 1px dashed #555; background: #1a1a1a; color: #00c853; cursor: pointer; margin-top: 10px; display: none; font-weight: bold; }
        
        #res { margin-top: 15px; padding: 15px; border-radius: 12px; display: none; background: #1a1a1a; border: 1px solid #333; }
        .v-text { font-weight: bold; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 10px; border: 1px solid; }
        .up { color: #00c853; border-color: #00c853; }
        .down { color: #ff3d00; border-color: #ff3d00; }
        #tv-chart { width: 100%; height: 300px; margin-top: 15px; border-radius: 15px; border: 1px solid #333; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; font-size: 18px; margin: 0 0 15px 0;">SUPREME TERMINAL 5.1</h2>
    
    <div class="mode-switch">
        <button id="l-btn" class="mode-btn btn-l active" onclick="setMode('LONG')">LONG ↑</button>
        <button id="s-btn" class="mode-btn btn-s" onclick="setMode('SHORT')">SHORT ↓</button>
    </div>

    <input type="text" id="coin" placeholder="Монета (напр. BTC)" onchange="showChart()">
    <input type="number" id="bal" placeholder="Депозит (USDT)">
    
    <div class="quick-risk">
        <button class="risk-btn" onclick="setRisk(1, this)">1%</button>
        <button class="risk-btn" onclick="setRisk(2, this)">2%</button>
        <button class="risk-btn" onclick="setRisk(3, this)">3%</button>
        <button class="risk-btn" onclick="setRisk(5, this)">5%</button>
    </div>
    <input type="number" id="risk" placeholder="Риск %">
    
    <input type="number" id="ent" placeholder="Вход">
    <input type="number" id="st" placeholder="Стоп">
    <input type="number" id="t1" placeholder="Тейк 1">
    <input type="number" id="t2" placeholder="Тейк 2">
    
    <button class="main-btn" onclick="runCalc()">АНАЛИЗИРОВАТЬ</button>
    <button id="cp-btn" class="copy-btn" onclick="doCopy()">📋 КОПИРОВАТЬ СИГНАЛ</button>

    <div id="res">
        <div id="v-box" class="v-text"></div>
        <div id="out" style="font-size: 14px; line-height: 1.6;"></div>
    </div>

    <div id="tv-chart"></div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let currentM = 'LONG';
    let txtToCopy = "";

    function setMode(m) {
        currentM = m;
        document.getElementById('l-btn').classList.toggle('active', m === 'LONG');
        document.getElementById('s-btn').classList.toggle('active', m === 'SHORT');
    }

    function setRisk(v, b) {
        document.getElementById('risk').value = v;
        document.querySelectorAll('.risk-btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
    }

    function showChart() {
        let s = document.getElementById('coin').value.toUpperCase().trim();
        if(!s) return;
        if(!s.endsWith('USDT')) s += 'USDT';
        document.getElementById('tv-chart').style.display = 'block';
        new TradingView.widget({
            "width": "100%", "height": 300, "symbol": s, "theme": "dark", "container_id": "tv-chart", "hide_top_toolbar": true
        });
    }

    function runCalc() {
        const coin = document.getElementById('coin').value.toUpperCase() || "ASSET";
        const bal = parseFloat(document.getElementById('bal').value);
        const riskP = parseFloat(document.getElementById('risk').value);
        const ent = parseFloat(document.getElementById('ent').value);
        const st = parseFloat(document.getElementById('st').value);
        const tp1 = parseFloat(document.getElementById('t1').value);
        const tp2 = parseFloat(document.getElementById('t2').value);

        if(!bal || !riskP || !ent || !st) { alert("Заполните основные поля!"); return; }

        const rAmt = (bal * (riskP/100)).toFixed(2);
        const sDist = Math.abs(ent - st);
        const sP = (sDist / ent * 100).toFixed(2);
        
        let lev = Math.floor(90 / sP);
        if(lev > 25) lev = 25;
        if(lev < 1) lev = 1;

        const pSize = (rAmt / (sDist / ent)).toFixed(2);
        const rr = tp2 ? (Math.abs(tp2 - ent) / sDist).toFixed(1) : "0";

        document.getElementById('res').style.display = 'block';
        document.getElementById('cp-btn').style.display = 'block';
        
        const vBox = document.getElementById('v-box');
        if(rr >= 2.5) { vBox.innerText = "✅ RR 1:" + rr + " (ОТЛИЧНО)"; vBox.className = "v-text up"; }
        else { vBox.innerText = "⚠️ RR 1:" + rr + " (РИСКОВАННО)"; vBox.className = "v-text down"; }

        document.getElementById('out').innerHTML = `
            <b>Плечо:</b> ${lev}x (Limit 25x)<br>
            <b>Позиция:</b> $${pSize}<br>
            <b>Риск:</b> $${rAmt} (${riskP}%)<br>
            <b>Стоп:</b> ${sP}%
        `;

        txtToCopy = 🚀 SIGNAL: ${coin} | ${currentM}\n\n +
                    📍 Entry: ${ent}\n +
                    🛡 Stop: ${st} (${sP}%)\n +
                    🎯 Take 1: ${tp1 || 'N/A'}\n +
                    🎯 Take 2: ${tp2 || 'N/A'}\n\n +
                    ⚙️ Leverage: ${lev}x;
    }

    function doCopy() {
        navigator.clipboard.writeText(txtToCopy);
        alert("Скопировано!");
    }
</script>
</body>
</html>
